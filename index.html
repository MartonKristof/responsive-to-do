<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <title>Feladatkezelő</title>
</head>
<body>
    <header>
        <h1>Feladatkezelő</h1>
        <span class="hamburger" id="hamburger"></span>
        <nav id="menu" class="menu">
            <a href="feladat lista">Új feladat</a>
            <a href="">Feladatok listája</a>
        </nav>
    </header>
    <Main>
        <div class="ToDo">
            <span id="feladatlista"></span>
            <h2>Feladatok</h2>
            <div class="cards">

            </div>
        </div>

    <div class="NewToDo">
        <div class="card">
            <h2>Új feladat</h2>
            <form id="newTaskForm">
                <input type="text" id="taskTitle" placeholder="Feladat címe" required>
                <textarea id="taskDescription" placeholder="Feladat leírása" required></textarea>
                <button type="submit">Hozzáadás</button>
            </form>
        </div>
    </div>
</main>

    </Main>
