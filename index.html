<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <link rel="icon" href="assets/icons/favicon.ico">
    <title>Feladatkezelő</title>
</head>
<body>
    <header>
        <div class="marka">
            <h1>Feladatkezelő</h1>
            <span class="hamburger-ikon" id="hamburgerGomb" role="button" aria-label="Menü megnyitása" aria-controls="navigacio" aria-expanded="false" tabindex="0"></span>
        </div>
        <button type="button" id="temaValto" class="tema-valto">Világos mód</button>
        <nav id="navigacio" class="navigacio-menu">
            <a href="#uj-feladat">Új feladat</a>
            <a href="#feladatlista">Feladatok listája</a>
        </nav>
    </header>
    <main>
        <div class="uj-feladat-resz" id="uj-feladat">
            <div class="kartya">
                <h2>Új feladat</h2>
                <form id="ujFeladatUrlap" novalidate>
                    <label for="feladatCim">Feladat címe</label>
                    <input type="text" id="feladatCim" placeholder="Feladat címe" required maxlength="60" aria-describedby="cimHibaUzenet">
                    <small id="cimHibaUzenet" class="urlap-hiba" role="alert" hidden></small>
                    <label for="feladatLeiras">Feladat leírása</label>
                    <textarea id="feladatLeiras" placeholder="Feladat leírása" required maxlength="200" aria-describedby="leirasHibaUzenet"></textarea>
                    <small id="leirasHibaUzenet" class="urlap-hiba" role="alert" hidden></small>
                    <button type="submit">Hozzáadás</button>
                </form>
            </div>
        </div>
        <div class="feladat-resz">
            <span id="feladatlista"></span>
            <h2>Feladatok</h2>
            <div class="feladat-eszkozok">
                <input type="search" id="feladatKereses" placeholder="Keresés a feladatok között" aria-label="Feladatok keresése">
                <button type="button" id="feladatokKapcsolo">Összes megjelenítése</button>
            </div>
            <div id="allapotUzenet" class="allapot" role="status" aria-live="polite" hidden></div>
            <div id="betoltesAllapot" class="betoltes" aria-live="polite" hidden>Betöltés...</div>
            <div id="uresAllapot" class="ures-allapot" hidden>Nincs megjeleníthető feladat.</div>
            <div class="kartyak">

            </div>
        </div>
    </main>
</body>
<script src="script.js"></script>
</html>
