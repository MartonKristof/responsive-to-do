<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <link rel="icon" href="assets/icons/favicon.ico">
    <title>Feladatkezelő</title>
</head>
<body>
    <header>
        <div class="brand">
            <h1>Feladatkezelő</h1>
            <span class="hamburger" id="hamburger"></span>
        </div>
        <nav id="menu" class="menu">
            <a href="#uj-feladat">Új feladat</a>
            <a href="#feladatlista">Feladatok listája</a>
        </nav>
    </header>
    <main>
        <div class="NewToDo" id="uj-feladat">
            <div class="card">
                <h2>Új feladat</h2>
                <form id="newTaskForm">
                    <input type="text" id="taskTitle" placeholder="Feladat címe" required>
                    <textarea id="taskDescription" placeholder="Feladat leírása" required></textarea>
                    <button type="submit">Hozzáadás</button>
                </form>
            </div>
        </div>
        <div class="ToDo">
            <span id="feladatlista"></span>
            <h2>Feladatok</h2>
            <button type="button" id="toggleTasks">Összes megjelenítése</button>
            <div class="cards">

            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
